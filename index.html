<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>MONSTER HOUSE</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+1p:wght@300;400&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #0a0a0f;
            font-family: 'M PLUS 1p', 'Inter', system-ui, sans-serif;
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 2rem; position: relative; overflow: hidden;
        }
        #particleCanvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 1;
        }
        .container {
            position: relative; z-index: 10;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: 2.5rem; width: 100%; max-width: 400px;
        }
        .divider {
            display: flex; align-items: center; gap: 12px;
            width: 100%; max-width: 280px; opacity: 0.5; margin: -0.5rem 0;
        }
        .divider::before, .divider::after {
            content: ''; flex: 1; height: 1px;
            background: linear-gradient(to right, transparent, #c6b0f0, transparent);
        }
        .diamond {
            width: 6px; height: 6px; background: #d7c4ff;
            transform: rotate(45deg); box-shadow: 0 0 8px #b794f0;
        }
        .title {
            font-family: 'M PLUS 1p', sans-serif; font-weight: 300;
            font-size: 3rem; letter-spacing: 7px; color: #f0e9ff;
            text-align: center; text-transform: uppercase;
            text-shadow: 0 0 25px rgba(180,150,255,0.6), 0 0 12px rgba(200,180,255,0.4), 0 2px 4px rgba(0,0,0,0.8);
            line-height: 1.2;
        }
        .buttons { display: flex; flex-direction: column; gap: 1rem; width: 100%; align-items: center; }
        .btn {
            display: flex; align-items: center; justify-content: center; gap: 12px;
            width: 100%; max-width: 280px; padding: 0.85rem 1.8rem; border-radius: 60px;
            background: rgba(15,10,25,0.75); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(180,150,240,0.4); color: #e8deff; text-decoration: none;
            font-size: 1.2rem; font-weight: 400; letter-spacing: 0.8px;
            transition: all 0.4s cubic-bezier(0.2,0.9,0.4,1);
            box-shadow: 0 0 12px rgba(140,100,255,0.2), 0 4px 15px rgba(0,0,0,0.7);
            position: relative; overflow: hidden;
        }
        .btn::after {
            content: ''; position: absolute; top: 0; left: -100%; width: 300%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
            transition: left 0.5s;
        }
        .btn:hover::after { left: 100%; }
        .btn img { width: 24px; height: 24px; filter: drop-shadow(0 0 6px #bc9eff); transition: filter 0.3s; }
        .btn:hover {
            background: rgba(25,15,45,0.85); border-color: rgba(200,170,255,0.8);
            box-shadow: 0 0 30px rgba(160,120,255,0.5), 0 8px 20px rgba(0,0,0,0.8);
            transform: translateY(-2px); color: #ffffff;
        }
        .btn:hover img { filter: drop-shadow(0 0 12px #caafff); }
        @media (max-width: 480px) {
            .title { font-size: 2.4rem; letter-spacing: 5px; }
            .btn { font-size: 1.1rem; padding: 0.7rem 1.5rem; gap: 10px; }
            .btn img { width: 22px; height: 22px; }
        }
    </style>
</head>
<body>

    <canvas id="particleCanvas"></canvas>

    <div class="container">
        <div class="divider"><div class="diamond"></div></div>
        <div class="title">MONSTER HOUSE</div>
        <div class="divider"><div class="diamond"></div></div>
        <div class="buttons">
            <a href="https://www.pixiv.net/users/45999158" target="_blank" rel="noopener noreferrer" class="btn">
                <img src="https://cdn.simpleicons.org/pixiv/ffffff" alt="Pixiv" /> Pixiv
            </a>
            <a href="https://www.patreon.com/cw/MONSTERHOUSE37" target="_blank" rel="noopener noreferrer" class="btn">
                <img src="https://cdn.simpleicons.org/patreon/ffffff" alt="Patreon" /> Patreon
            </a>
        </div>
    </div>

    <script>
        (function() {
            const canvas = document.getElementById('particleCanvas');
            const ctx = canvas.getContext('2d');
            
            let particles = [];
            let mouse = { x: -100, y: -100, active: false };
            let lastMouse = { x: -100, y: -100 };

            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resize);
            resize();

            window.addEventListener('mousemove', (e) => {
                mouse.x = e.clientX;
                mouse.y = e.clientY;
                mouse.active = true;
            });
            window.addEventListener('mouseleave', () => {
                mouse.active = false;
            });

            const SHAPES = ['square', 'circle', 'triangle', 'star'];
            
            function drawShape(ctx, x, y, size, shape, rotation = 0) {
                ctx.save();
                ctx.translate(x, y);
                ctx.rotate(rotation);
                switch (shape) {
                    case 'square':
                        ctx.fillRect(-size/2, -size/2, size, size);
                        break;
                    case 'circle':
                        ctx.beginPath();
                        ctx.arc(0, 0, size/2, 0, Math.PI*2);
                        ctx.fill();
                        break;
                    case 'triangle':
                        ctx.beginPath();
                        const h = size * Math.sin(Math.PI/3);
                        ctx.moveTo(0, -h/2);
                        ctx.lineTo(-size/2, h/2);
                        ctx.lineTo(size/2, h/2);
                        ctx.closePath();
                        ctx.fill();
                        break;
                    case 'star':
                        ctx.beginPath();
                        const spikes = 5;
                        const outerR = size/2;
                        const innerR = size/4;
                        for (let i = 0; i < spikes*2; i++) {
                            const r = i % 2 === 0 ? outerR : innerR;
                            const angle = (i * Math.PI) / spikes - Math.PI/2;
                            const xp = Math.cos(angle) * r;
                            const yp = Math.sin(angle) * r;
                            if (i === 0) ctx.moveTo(xp, yp);
                            else ctx.lineTo(xp, yp);
                        }
                        ctx.closePath();
                        ctx.fill();
                        break;
                }
                ctx.restore();
            }

            class Particle {
                constructor(x, y, type = 'move') {
                    this.x = x;
                    this.y = y;
                    this.size = Math.random() * 9 + 6; // 6~15px
                    this.life = 1;
                    this.rotation = Math.random() * Math.PI * 2;
                    this.shape = SHAPES[Math.floor(Math.random() * SHAPES.length)];
                    
                    if (type === 'move') {
                        // 鼠标轨迹粒子：轻柔向上飘散
                        this.vx = (Math.random() - 0.5) * 0.6;
                        this.vy = -Math.random() * 1.2 - 0.5;
                        this.decay = Math.random() * 0.015 + 0.01;
                        this.hue = Math.random() * 360;
                    } else {
                        // 背景粒子：固有的缓慢漂流速度，且不衰减
                        this.vx = (Math.random() - 0.5) * 0.4;
                        this.vy = (Math.random() - 0.5) * 0.4;
                        this.decay = 0;
                        this.life = 0.6 + Math.random() * 0.4;
                        this.hue = 260 + Math.random() * 60;
                    }
                    this.saturation = 80 + Math.random() * 20;
                    this.lightness = 60 + Math.random() * 30;
                }

                update() {
                    // 鼠标排斥力（轻柔）
                    if (mouse.active) {
                        const dx = this.x - mouse.x;
                        const dy = this.y - mouse.y;
                        const dist = Math.sqrt(dx*dx + dy*dy);
                        const repelRadius = 100;
                        if (dist < repelRadius && dist > 0.1) {
                            const force = (1 - dist / repelRadius) * 0.06;
                            this.vx += (dx / dist) * force;
                            this.vy += (dy / dist) * force;
                        }
                    }
                    
                    // 只有鼠标轨迹粒子使用速度阻尼，背景粒子不阻尼（保持恒定飘浮）
                    if (this.decay > 0) {
                        this.vx *= 0.99;
                        this.vy *= 0.99;
                    }
                    
                    this.x += this.vx;
                    this.y += this.vy;
                    
                    if (this.decay > 0) {
                        this.life -= this.decay;
                    } else {
                        // 背景粒子边界环绕（扩大缓冲区避免突然消失）
                        if (this.x < -40) this.x = canvas.width + 40;
                        if (this.x > canvas.width + 40) this.x = -40;
                        if (this.y < -40) this.y = canvas.height + 40;
                        if (this.y > canvas.height + 40) this.y = -40;
                    }
                }

                draw(ctx) {
                    if (this.life <= 0) return;
                    ctx.save();
                    ctx.globalAlpha = this.life;
                    const glowSize = this.size * 2.0;
                    const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, glowSize);
                    gradient.addColorStop(0, `hsla(${this.hue}, ${this.saturation}%, ${this.lightness}%, 0.25)`);
                    gradient.addColorStop(1, `hsla(${this.hue}, ${this.saturation}%, ${this.lightness}%, 0)`);
                    ctx.fillStyle = gradient;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, glowSize, 0, Math.PI*2);
                    ctx.fill();
                    
                    ctx.globalAlpha = this.life * 0.95;
                    ctx.fillStyle = `hsla(${this.hue}, ${this.saturation}%, 85%, 0.95)`;
                    drawShape(ctx, this.x, this.y, this.size, this.shape, this.rotation);
                    ctx.restore();
                }
            }

            function initBgParticles(count) {
                for (let i = 0; i < count; i++) {
                    const x = Math.random() * canvas.width;
                    const y = Math.random() * canvas.height;
                    particles.push(new Particle(x, y, 'bg'));
                }
            }
            initBgParticles(70);

            function spawnMoveParticles(x, y, count) {
                for (let i = 0; i < count; i++) {
                    particles.push(new Particle(x, y, 'move'));
                }
            }

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                if (mouse.active) {
                    const dx = mouse.x - lastMouse.x;
                    const dy = mouse.y - lastMouse.y;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist > 4) {
                        const spawnCount = Math.min(Math.floor(dist * 0.6), 5);
                        spawnMoveParticles(mouse.x, mouse.y, spawnCount);
                    }
                    lastMouse.x = mouse.x;
                    lastMouse.y = mouse.y;
                } else {
                    lastMouse.x = mouse.x;
                    lastMouse.y = mouse.y;
                }

                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    p.update();
                    p.draw(ctx);
                    if (p.decay > 0 && p.life <= 0) {
                        particles.splice(i, 1);
                    }
                }

                if (particles.length > 200) {
                    for (let i = particles.length - 1; i >= 0; i--) {
                        if (particles[i].decay > 0) {
                            particles.splice(i, 1);
                            if (particles.length <= 200) break;
                        }
                    }
                }

                requestAnimationFrame(animate);
            }

            animate();
        })();
    </script>
</body>
</html>
